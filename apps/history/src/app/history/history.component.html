<section class="history">
  <header class="history__header">
    <h1 class="history__title">{{ 'history.title' | translate }}</h1>

    <ui-button type="button" priority="primary" routerLink="/dashboard">
      {{ 'history.dashboard' | translate }}
    </ui-button>
  </header>

  <app-history-table
    [events]="historyEvents()"
    [totalItems]="historyTotal()"
    [query]="historyQuery()"
    [isLoading]="isLoading()"
    (queryChange)="onQueryChange($event)"
  />
</section>
