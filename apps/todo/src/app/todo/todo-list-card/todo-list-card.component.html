@let controls = taskForm.controls;

<mat-card class="todo-list-card" [class.todo-list-card--loading]="isLoading()" [attr.aria-busy]="isLoading()">
  <mat-card-header class="todo-list-card__header">
    <mat-card-title class="todo-list-card__title">
      {{ todo().name }}
    </mat-card-title>
  </mat-card-header>

  <mat-card-content class="todo-list-card__content">
    <form class="todo-list-card__task-form" [formGroup]="taskForm" #taskFormDirective="ngForm" (ngSubmit)="onAddTask(taskFormDirective)">
      <ui-input [label]="'todo.fields.taskDescription' | translate" [type]="uiInputType.Text" [control]="controls.name" />

      <ui-button type="submit" [disabled]="taskForm.invalid || isLoading()">
        {{ 'todo.actions.addTask' | translate }}
      </ui-button>
    </form>
  </mat-card-content>

  <mat-card-actions class="todo-list-card__actions">
    <ui-button type="button" priority="secondary" [disabled]="isLoading()" (click)="onDeleteTodo()">
      {{ 'todo.actions.deleteList' | translate }}
    </ui-button>
  </mat-card-actions>

  @if (todo().tasks.length) {
    <div class="todo-list-card__tasks">
      @for (task of todo().tasks; track task.id) {
        <app-todo-task-item
          [task]="task"
          [isLoading]="isLoading()"
          (deleteTask)="onDeleteTask($event)"
          (completedChange)="onToggleTaskCompleted($event)"
          (updateTask)="onUpdateTask($event)"
        />
      }
    </div>
  }

  @if (isLoading()) {
    <div class="todo-list-card__loader">
      <ui-spinner size="small" [ariaLabel]="'todo.accessibility.loadingList' | translate" />
    </div>
  }
</mat-card>
