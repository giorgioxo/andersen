<section class="ui-dialog">
  <h2 class="ui-dialog__title" mat-dialog-title>{{ dialogData.title }}</h2>

  <mat-dialog-content class="ui-dialog__content">
    <p class="ui-dialog__description">{{ dialogData.description }}</p>
  </mat-dialog-content>

  <mat-dialog-actions class="ui-dialog__actions">
    <ui-button class="ui-dialog__action" priority="secondary" type="button" (click)="cancel()">
      {{ dialogData.cancelText }}
    </ui-button>

    <ui-button class="ui-dialog__action" type="button" (click)="confirm()">
      {{ dialogData.confirmText }}
    </ui-button>
  </mat-dialog-actions>
</section>
