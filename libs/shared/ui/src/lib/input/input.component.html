<div class="ui-input">
  <mat-form-field class="ui-input__field" appearance="outline">
    <mat-label>{{ label() }}</mat-label>

    <input
      #inputElement
      matInput
      [type]="inputType()"
      [formControl]="control()"
      [required]="isRequired()"
      [autocomplete]="autocomplete()"
    />

    @if (isPasswordInput()) {
      <button
        class="ui-input__toggle"
        matIconButton
        matSuffix
        type="button"
        [attr.aria-label]="passwordToggleLabel()"
        [attr.aria-pressed]="!isPasswordHidden()"
        (click)="togglePasswordVisibility($event)"
      >
        <mat-icon aria-hidden="true">
          {{ passwordToggleIcon() }}
        </mat-icon>
      </button>
    }

    @if (getErrorMessage(); as message) {
      <mat-error>{{ message }}</mat-error>
    }
  </mat-form-field>
</div>
