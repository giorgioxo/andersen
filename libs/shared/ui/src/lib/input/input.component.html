<div class="ui-input">
  <mat-form-field class="ui-input__field" appearance="outline">
    <mat-label>{{ label() }}</mat-label>

    <input #inputElement matInput [type]="inputType()" [formControl]="control()" />

    @if (isPasswordInput()) {
      <button
        class="ui-input__toggle"
        matIconButton
        matSuffix
        type="button"
        [attr.aria-label]="passwordVisibilityView().ariaLabel"
        [attr.aria-pressed]="!isPasswordHidden()"
        (click)="togglePasswordVisibility($event)"
      >
        @if (passwordVisibilityView().iconType === uiPasswordVisibilityIconType.Material) {
          <mat-icon>{{ passwordVisibilityView().icon }}</mat-icon>
        } @else {
          <img class="ui-input__toggle-svg" [src]="passwordVisibilityView().icon" alt="" aria-hidden="true" />
        }
      </button>
    }
  </mat-form-field>

  @if (getErrorMessage(); as message) {
    <p class="ui-input__error">{{ message }}</p>
  }
</div>
