<button
  matButton="filled"
  [type]="type()"
  [disabled]="isDisabled()"
  class="ui-button"
  [class.ui-button--secondary]="priority() === 'secondary'"
>
  <span class="ui-button__content" [class.ui-button__content--hidden]="isLoading()">
    <ng-content />
  </span>

  @if (isLoading()) {
    <span class="ui-button__spinner">
      <ui-spinner size="small" />
    </span>
  }
</button>
