<button
  [matButton]="appearance()"
  [type]="type()"
  [disabled]="disabled() || loading()"
  class="ui-button"
  [class.ui-button--secondary]="priority() === 'secondary'"
  [class.ui-button--loading]="loading()"
>
  <span class="ui-button__content" [class.ui-button__content--hidden]="loading()">
    <ng-content />
  </span>

  @if (loading()) {
    <span class="ui-button__spinner">
      <ui-spinner size="small" />
    </span>
  }
</button>
