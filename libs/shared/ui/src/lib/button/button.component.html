<button
  matButton="filled"
  class="ui-button"
  [type]="type()"
  [disabled]="isDisabled()"
  [attr.aria-busy]="isLoading()"
  [class.ui-button--secondary]="isSecondary()"
>
  <span class="ui-button__content" [class.ui-button__content--hidden]="isLoading()">
    <ng-content />
  </span>

  @if (isLoading()) {
    <span class="ui-button__spinner" aria-hidden="true">
      <ui-spinner size="small" />
    </span>
  }
</button>
